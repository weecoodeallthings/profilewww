<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trik Lolos Sidang TA IT | weecoo.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles.css?v=2">
  <link rel="stylesheet" href="../content-styles.css">
</head>
<body class="dark-mode">

  <main>
    <!-- Slide Book Post Viewport Section -->
    <section class="content-detail-section">
      <div class="content-container">
        
        <!-- Widescreen 16:9 Viewport -->
        <div class="content-viewport" id="slide-viewport">
          <!-- Dynamically filled by JS -->
        </div>

        <!-- Slide Navigation Controls -->
        <div class="book-controls" style="margin-top: 1.5rem;">
          <a href="../index.html" class="book-btn">➔ KEMBALI KE LIST</a>
          <div>
            <button class="book-btn" id="prev-btn">◀ PREV</button>
            <button class="book-btn" id="next-btn">NEXT ▶</button>
          </div>
          <span class="book-page-num" id="page-num" style="font-weight: 800; min-width: 60px; text-align: center;">1 / 4</span>
        </div>

      </div>
    </section>
  </main>

  <script>
    const slides = [
  {
    "isCover": true,
    "category": "CONTENT #03",
    "title": "TRIK LOLOS SIDANG TUGAS AKHIR IT TANPA PANIK 🎓"
  },
  {
    "title": "3 PERTANYAAN KUNCI DOSEN PENGUJI",
    "subtitle": "Persiapkan jawaban terbaik untuk pertanyaan jebakan dosen berikut ini:",
    "bullets": [
      "Kenapa Memilih Arsitektur Ini?: Jelaskan pembagian MVC/modular untuk kebersihan struktur kode.",
      "Bagaimana Skema Relasi Database?: Pahami Primary Key, Foreign Key, dan relasi one-to-many antartabel.",
      "Jelaskan Alur Kerja Fitur Utama: Gambarkan diagram alur sistem dari input user hingga respon database."
    ]
  },
  {
    "title": "LANGKAH PERSIAPAN H-3 SIDANG",
    "subtitle": "Lakukan pemeriksaan checklist kelayakan sistem web Anda:",
    "bullets": [
      "Uji Skenario Gagal/Error: Pastikan validasi form berjalan dan pesan error tampil ramah di antarmuka.",
      "Buat Ringkasan Alur Logic: Catat poin penting cara kerja controller utama agar tidak lupa saat ditanya.",
      "Latihan Presentasi Terbatas: Simulasikan demonstrasi fitur web secara efisien dalam waktu maksimal 10 menit."
    ]
  },
  {
    "title": "BUTUH TEMAN TANDING SIMULASI? ⚡",
    "subtitle": "Kami merancang custom web tugas akhir sekaligus melatih mahasiswa agar siap sidang:",
    "bullets": [
      "Panduan Penjelasan Baris Kode: PDF rangkuman skema database & alur logic modular yang mudah dipahami.",
      "Sesi Simulasi Sidang Zoom: Rasakan atmosfer sidang nyata dengan tanya jawab teknis bersama tim kami.",
      "DM Kita Sekarang: Konsultasikan judul tugas akhir kamu secara gratis via DM TikTok di @weecoo!"
    ]
  }
];

    let currentIdx = 0;

    function renderSlide() {
      const slide = slides[currentIdx];
      const viewport = document.getElementById('slide-viewport');
      const pageNum = document.getElementById('page-num');
      
      pageNum.textContent = (currentIdx + 1) + ' / ' + slides.length;
      
      if (slide.isCover) {
        viewport.innerHTML = 
          '<div class="content-header">' +
          '  <span class="content-brand">weecoo.</span>' +
          '  <span class="content-page-num" id="page-num-inner"></span>' +
          '</div>' +
          '<div class="content-content-area">' +
          '  <div class="content-cover-wrapper">' +
          '    <div class="content-cover-badge">' + slide.category + '</div>' +
          '    <h2 class="content-cover-title">' + slide.title + '</h2>' +
          '  </div>' +
          '</div>' +
          '<div class="content-footer">' +
          '  <span class="content-author">@weecoo</span>' +
          '  <span class="content-author">MASTERED BLUEPRINT ⚡</span>' +
          '</div>';
      } else {
        let bulletListHtml = '';
        if (slide.bullets) {
          slide.bullets.forEach(function(bullet) {
            bulletListHtml += '<li class="content-bullet-item">' + bullet + '</li>';
          });
        }
        
        let codeBlockHtml = '';
        if (slide.code) {
          codeBlockHtml += '<pre class="content-code-block">' + slide.code + '</pre>';
        }
        
        viewport.innerHTML = 
          '<div class="content-header">' +
          '  <span class="content-brand">weecoo.</span>' +
          '  <span class="content-page-num" id="page-num-inner"></span>' +
          '</div>' +
          '<div class="content-content-area">' +
          '  <h2 class="content-slide-title">' + slide.title + '</h2>' +
          (slide.subtitle ? '<p class="content-slide-subtitle">' + slide.subtitle + '</p>' : '') +
          codeBlockHtml +
          (bulletListHtml ? '<ul class="content-bullets">' + bulletListHtml + '</ul>' : '') +
          '</div>' +
          '<div class="content-footer">' +
          '  <span class="content-author">@weecoo</span>' +
          '  <span class="content-author">MASTERED BLUEPRINT ⚡</span>' +
          '</div>';
      }
      
      document.getElementById('page-num-inner').textContent = (currentIdx + 1) + '/' + slides.length;
    }

    document.getElementById('prev-btn').addEventListener('click', function() {
      if (currentIdx > 0) {
        currentIdx--;
        renderSlide();
      }
    });

    document.getElementById('next-btn').addEventListener('click', function() {
      if (currentIdx < slides.length - 1) {
        currentIdx++;
        renderSlide();
      }
    });

    renderSlide();
  </script>
</body>
</html>
