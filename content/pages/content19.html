<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cara Hosting Web Gratis | weecoo.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles.css?v=2">
  <link rel="stylesheet" href="../content-styles.css">
  <!-- PrismJS Dracula Theme for premium syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism-themes/1.9.0/prism-dracula.min.css">
</head>
<body class="dark-mode">

  <main>
    <!-- Slide Book Post Viewport Section -->
    <section class="content-detail-section">
      <div class="content-container">
        
        <!-- Widescreen 16:9 Viewport -->
        <div class="content-viewport" id="slide-viewport">
          <!-- Dynamically filled by JS -->
        </div>

        <!-- Slide Navigation Controls -->
        <div class="book-controls" style="margin-top: 1.5rem;">
          <a href="../index.html" class="book-btn">➔ KEMBALI KE LIST</a>
          <div>
            <button class="book-btn" id="prev-btn">◀ PREV</button>
            <button class="book-btn" id="next-btn">NEXT ▶</button>
          </div>
          <span class="book-page-num" id="page-num" style="font-weight: 800; min-width: 60px; text-align: center;">1 / 4</span>
        </div>

      </div>
    </section>
  </main>

  <!-- PrismJS Core and components for code highlight -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-php.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>

  <script>
    const slides = [
  {
    "isCover": true,
    "category": "CONTENT #19",
    "title": "CARA HOSTING WEBSITE GRATIS DI VERCEL / NETLIFY ☁️"
  },
  {
    "title": "PERSIAPAN FILE PROYEK",
    "subtitle": "Pastikan struktur folder web Anda sudah rapi dan siap dideteksi server otomatis:",
    "bullets": [
      "Wajib Memiliki index.html: Halaman utama website harus dinamai 'index.html' di root folder.",
      "Simpan Aset di Subfolder: Kelompokkan gambar, CSS, dan JS ke folder pendukung khusus.",
      "Hubungkan ke GitHub: Buat repositori Git baru dan push seluruh source code ke GitHub."
    ]
  },
  {
    "title": "LANGKAH DEPLOYMENT INSTAN",
    "subtitle": "Proses publikasi otomatis dalam hitungan detik tanpa setup web server manual:",
    "bullets": [
      "Masuk ke Vercel/Netlify: Login menggunakan akun GitHub Anda secara gratis.",
      "Import Repositori: Pilih repositori proyek website Anda yang ingin dideploy.",
      "Klik Deploy: Server akan mendeteksi file HTML/JS secara otomatis dan memberikan domain HTTPS gratis."
    ]
  },
  {
    "title": "PROYEK SIAP DIKIRIM KE DOSEN/CLIENT! ⚡",
    "subtitle": "Layanan hosting modern ini sangat praktis untuk memamerkan hasil karya portofoliomu:",
    "bullets": [
      "Auto-Update: Setiap kali Anda melakukan 'git push' ke GitHub, website di internet otomatis terupdate.",
      "Bebas Biaya: Cocok untuk menghemat budget tugas akhir tanpa perlu membeli paket hosting bulanan.",
      "Butuh bantuan menyambungkan domain custom (.com/.id) pada hosting gratisan Anda? DM TikTok @weecoo!"
    ]
  }
];

    let currentIdx = 0;

    function renderSlide() {
      const slide = slides[currentIdx];
      const viewport = document.getElementById('slide-viewport');
      const pageNum = document.getElementById('page-num');
      
      pageNum.textContent = (currentIdx + 1) + ' / ' + slides.length;
      
      if (slide.isCover) {
        viewport.innerHTML = 
          '<div class="content-header">' +
          '  <span class="content-brand">weecoo.</span>' +
          '  <span class="content-page-num" id="page-num-inner"></span>' +
          '</div>' +
          '<div class="content-content-area">' +
          '  <div class="content-cover-wrapper">' +
          '    <div class="content-cover-badge">' + slide.category + '</div>' +
          '    <h2 class="content-cover-title">' + slide.title + '</h2>' +
          '  </div>' +
          '</div>' +
          '<div class="content-footer">' +
          '  <span class="content-author">@weecoo</span>' +
          '  <span class="content-author">MASTERED BLUEPRINT ⚡</span>' +
          '</div>';
      } else {
        let bulletListHtml = '';
        if (slide.bullets) {
          slide.bullets.forEach(function(bullet) {
            bulletListHtml += '<li class="content-bullet-item">' + bullet + '</li>';
          });
        }
        
        let codeBlockHtml = '';
        if (slide.code) {
          const langClass = slide.lang ? 'language-' + slide.lang : 'language-javascript';
          codeBlockHtml += '<pre class="' + langClass + '"><code class="' + langClass + '">' + slide.code + '</code></pre>';
        }
        
        viewport.innerHTML = 
          '<div class="content-header">' +
          '  <span class="content-brand">weecoo.</span>' +
          '  <span class="content-page-num" id="page-num-inner"></span>' +
          '</div>' +
          '<div class="content-content-area">' +
          '  <h2 class="content-slide-title">' + slide.title + '</h2>' +
          (slide.subtitle ? '<p class="content-slide-subtitle">' + slide.subtitle + '</p>' : '') +
          codeBlockHtml +
          (bulletListHtml ? '<ul class="content-bullets">' + bulletListHtml + '</ul>' : '') +
          '</div>' +
          '<div class="content-footer">' +
          '  <span class="content-author">@weecoo</span>' +
          '  <span class="content-author">MASTERED BLUEPRINT ⚡</span>' +
          '</div>';
      }
      
      document.getElementById('page-num-inner').textContent = (currentIdx + 1) + '/' + slides.length;
      
      // Trigger Prism highlighting for dynamically generated slides
      if (typeof Prism !== 'undefined') {
        Prism.highlightAll();
      }
    }

    document.getElementById('prev-btn').addEventListener('click', function() {
      if (currentIdx > 0) {
        currentIdx--;
        renderSlide();
      }
    });

    document.getElementById('next-btn').addEventListener('click', function() {
      if (currentIdx < slides.length - 1) {
        currentIdx++;
        renderSlide();
      }
    });

    renderSlide();
  </script>
</body>
</html>
