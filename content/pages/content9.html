<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cara Optimasi PageSpeed 100/100 | weecoo.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles.css?v=2">
  <link rel="stylesheet" href="../content-styles.css">
</head>
<body class="dark-mode">

  <main>
    <!-- Slide Book Post Viewport Section -->
    <section class="content-detail-section">
      <div class="content-container">
        
        <!-- Widescreen 16:9 Viewport -->
        <div class="content-viewport" id="slide-viewport">
          <!-- Dynamically filled by JS -->
        </div>

        <!-- Slide Navigation Controls -->
        <div class="book-controls" style="margin-top: 1.5rem;">
          <a href="../index.html" class="book-btn">➔ KEMBALI KE LIST</a>
          <div>
            <button class="book-btn" id="prev-btn">◀ PREV</button>
            <button class="book-btn" id="next-btn">NEXT ▶</button>
          </div>
          <span class="book-page-num" id="page-num" style="font-weight: 800; min-width: 60px; text-align: center;">1 / 4</span>
        </div>

      </div>
    </section>
  </main>

  <script>
    const slides = [
  {
    "isCover": true,
    "category": "CONTENT #09",
    "title": "OPTIMASI SPEED WEB HINGGA 100/100 LIGHTHOUSE ⚡"
  },
  {
    "title": "PENYEBAB WEB LAMBAT & LAGGY",
    "subtitle": "Hal-hal umum yang memperlambat rendering halaman web Anda:",
    "bullets": [
      "Gambar Terlalu Besar: Mengunggah foto beresolusi mentah (2MB+) tanpa kompresi format modern.",
      "CSS/JS Membengkak: Terlalu banyak stylesheet pihak ketiga yang memblokir rendering halaman awal.",
      "Hosting Berkualitas Rendah: Kecepatan response server lambat akibat server murah tanpa konfigurasi cache."
    ]
  },
  {
    "title": "3 LANGKAH PERBAIKAN UTAMA",
    "subtitle": "Lakukan tindakan berikut untuk menaikkan skor performa Google Lighthouse:",
    "bullets": [
      "Ubah Gambar ke WebP: Gunakan format WebP atau AVIF dengan kompresi kualitas 75-80%.",
      "Minify & Bundle Code: Hapus spasi dan komentar dalam berkas CSS/JS menggunakan builder tool.",
      "Gunakan CDN (Content Delivery Network): Sajikan file statis dari server terdekat ke lokasi pengguna."
    ]
  },
  {
    "title": "HASIL WEB PREMIUM WEECOO ⚡",
    "subtitle": "Kami selalu menjamin produk web yang kami deliver memiliki kecepatan tinggi:",
    "bullets": [
      "Optimasi Core Web Vitals: Memaksimalkan kepuasan pengguna saat mengakses sistem di smartphone.",
      "Tingkat Konversi Tinggi: Pengunjung web tidak akan pergi karena loading web selesai dalam <1 detik.",
      "Konsultasikan optimasi website lambatmu ke ahlinya! Hubungi kami via DM TikTok @weecoo."
    ]
  }
];

    let currentIdx = 0;

    function renderSlide() {
      const slide = slides[currentIdx];
      const viewport = document.getElementById('slide-viewport');
      const pageNum = document.getElementById('page-num');
      
      pageNum.textContent = (currentIdx + 1) + ' / ' + slides.length;
      
      if (slide.isCover) {
        viewport.innerHTML = 
          '<div class="content-header">' +
          '  <span class="content-brand">weecoo.</span>' +
          '  <span class="content-page-num" id="page-num-inner"></span>' +
          '</div>' +
          '<div class="content-content-area">' +
          '  <div class="content-cover-wrapper">' +
          '    <div class="content-cover-badge">' + slide.category + '</div>' +
          '    <h2 class="content-cover-title">' + slide.title + '</h2>' +
          '  </div>' +
          '</div>' +
          '<div class="content-footer">' +
          '  <span class="content-author">@weecoo</span>' +
          '  <span class="content-author">MASTERED BLUEPRINT ⚡</span>' +
          '</div>';
      } else {
        let bulletListHtml = '';
        if (slide.bullets) {
          slide.bullets.forEach(function(bullet) {
            bulletListHtml += '<li class="content-bullet-item">' + bullet + '</li>';
          });
        }
        
        let codeBlockHtml = '';
        if (slide.code) {
          codeBlockHtml += '<pre class="content-code-block">' + slide.code + '</pre>';
        }
        
        viewport.innerHTML = 
          '<div class="content-header">' +
          '  <span class="content-brand">weecoo.</span>' +
          '  <span class="content-page-num" id="page-num-inner"></span>' +
          '</div>' +
          '<div class="content-content-area">' +
          '  <h2 class="content-slide-title">' + slide.title + '</h2>' +
          (slide.subtitle ? '<p class="content-slide-subtitle">' + slide.subtitle + '</p>' : '') +
          codeBlockHtml +
          (bulletListHtml ? '<ul class="content-bullets">' + bulletListHtml + '</ul>' : '') +
          '</div>' +
          '<div class="content-footer">' +
          '  <span class="content-author">@weecoo</span>' +
          '  <span class="content-author">MASTERED BLUEPRINT ⚡</span>' +
          '</div>';
      }
      
      document.getElementById('page-num-inner').textContent = (currentIdx + 1) + '/' + slides.length;
    }

    document.getElementById('prev-btn').addEventListener('click', function() {
      if (currentIdx > 0) {
        currentIdx--;
        renderSlide();
      }
    });

    document.getElementById('next-btn').addEventListener('click', function() {
      if (currentIdx < slides.length - 1) {
        currentIdx++;
        renderSlide();
      }
    });

    renderSlide();
  </script>
</body>
</html>
