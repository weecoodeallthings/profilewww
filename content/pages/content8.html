<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React vs Vue vs Svelte | weecoo.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles.css?v=2">
  <link rel="stylesheet" href="../content-styles.css">
</head>
<body class="dark-mode">

  <main>
    <!-- Slide Book Post Viewport Section -->
    <section class="content-detail-section">
      <div class="content-container">
        
        <!-- Widescreen 16:9 Viewport -->
        <div class="content-viewport" id="slide-viewport">
          <!-- Dynamically filled by JS -->
        </div>

        <!-- Slide Navigation Controls -->
        <div class="book-controls" style="margin-top: 1.5rem;">
          <a href="../index.html" class="book-btn">➔ KEMBALI KE LIST</a>
          <div>
            <button class="book-btn" id="prev-btn">◀ PREV</button>
            <button class="book-btn" id="next-btn">NEXT ▶</button>
          </div>
          <span class="book-page-num" id="page-num" style="font-weight: 800; min-width: 60px; text-align: center;">1 / 4</span>
        </div>

      </div>
    </section>
  </main>

  <script>
    const slides = [
  {
    "isCover": true,
    "category": "CONTENT #08",
    "title": "PERBANDINGAN REACT, VUE, DAN SVELTE 🚀"
  },
  {
    "title": "REACT: EKOSISTEM RAKSASA",
    "subtitle": "Dikembangkan Meta, berbasis virtual DOM, dengan lapangan kerja paling melimpah:",
    "bullets": [
      "Banyak Komponen Siap Pakai: Pustaka pihak ketiga sangat besar, mempercepat durasi pengerjaan.",
      "Kurva Belajar Sedang-Tinggi: Memerlukan pemahaman JavaScript tingkat lanjut (functional programming).",
      "Ukuran Bundel Relatif Besar: Menyertakan react-dom yang menambah bobot performa awal."
    ]
  },
  {
    "title": "VUE & SVELTE: RAMAH & CEPAT",
    "subtitle": "Alternatif terbaik jika menginginkan kecepatan loading murni dan sintaksis yang intuitif:",
    "bullets": [
      "Vue (Ramah Pemula): Sintaks template HTML yang familiar dan terdokumentasi dengan baik.",
      "Svelte (Tanpa Virtual DOM): Mengkompilasi kode langsung saat build-time, menghasilkan bundel paling ringan.",
      "Kurva Belajar Lebih Rendah: Jauh lebih mudah dipahami oleh mahasiswa SMK RPL atau pemula."
    ]
  },
  {
    "title": "MANA PILIHAN TERBAIK UNTUKMU? ⚡",
    "subtitle": "Pilih teknologi berdasarkan kebutuhan target proyek atau skripsimu:",
    "bullets": [
      "Pilih React jika mengincar lapangan kerja industri besar atau startup tingkat atas.",
      "Pilih Svelte/Vue jika Anda mengutamakan skor PageSpeed tinggi dan performa murni.",
      "Butuh jasa bimbingan pembuatan aplikasi web modern dengan React/Vue/Svelte? Kontak TikTok @weecoo!"
    ]
  }
];

    let currentIdx = 0;

    function renderSlide() {
      const slide = slides[currentIdx];
      const viewport = document.getElementById('slide-viewport');
      const pageNum = document.getElementById('page-num');
      
      pageNum.textContent = (currentIdx + 1) + ' / ' + slides.length;
      
      if (slide.isCover) {
        viewport.innerHTML = `
          <div class="content-header">
            <span class="content-brand">weecoo.</span>
            <span class="content-page-num" id="page-num-inner"></span>
          </div>
          <div class="content-content-area">
            <div class="content-cover-wrapper">
              <div class="content-cover-badge">${slide.category}</div>
              <h2 class="content-cover-title">${slide.title}</h2>
            </div>
          </div>
          <div class="content-footer">
            <span class="content-author">@weecoo</span>
            <span class="content-author">MASTERED BLUEPRINT ⚡</span>
          </div>
        `;
      } else {
        let bulletListHtml = '';
        if (slide.bullets) {
          slide.bullets.forEach(bullet => {
            bulletListHtml += \`<li class="content-bullet-item">\${bullet}</li>\`;
          });
        }
        
        let codeBlockHtml = '';
        if (slide.code) {
          codeBlockHtml += \`<pre class="content-code-block">\${slide.code}</pre>\`;
        }
        
        viewport.innerHTML = `
          <div class="content-header">
            <span class="content-brand">weecoo.</span>
            <span class="content-page-num" id="page-num-inner"></span>
          </div>
          <div class="content-content-area">
            <h2 class="content-slide-title">${slide.title}</h2>
            ${slide.subtitle ? \`<p class="content-slide-subtitle">\${slide.subtitle}</p>\` : ''}
            ${codeBlockHtml}
            ${bulletListHtml ? \`<ul class="content-bullets">\${bulletListHtml}</ul>\` : ''}
          </div>
          <div class="content-footer">
            <span class="content-author">@weecoo</span>
            <span class="content-author">MASTERED BLUEPRINT ⚡</span>
          </div>
        `;
      }
      
      document.getElementById('page-num-inner').textContent = (currentIdx + 1) + '/' + slides.length;
    }

    document.getElementById('prev-btn').addEventListener('click', () => {
      if (currentIdx > 0) {
        currentIdx--;
        renderSlide();
      }
    });

    document.getElementById('next-btn').addEventListener('click', () => {
      if (currentIdx < slides.length - 1) {
        currentIdx++;
        renderSlide();
      }
    });

    renderSlide();
  </script>
</body>
</html>
