<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind CSS vs Vanilla CSS | weecoo.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles.css?v=2">
  <link rel="stylesheet" href="../content-styles.css">
</head>
<body class="dark-mode">

  <main>
    <!-- Slide Book Post Viewport Section -->
    <section class="content-detail-section">
      <div class="content-container">
        
        <!-- Widescreen 16:9 Viewport -->
        <div class="content-viewport" id="slide-viewport">
          <!-- Dynamically filled by JS -->
        </div>

        <!-- Slide Navigation Controls -->
        <div class="book-controls" style="margin-top: 1.5rem;">
          <a href="../index.html" class="book-btn">➔ KEMBALI KE LIST</a>
          <div>
            <button class="book-btn" id="prev-btn">◀ PREV</button>
            <button class="book-btn" id="next-btn">NEXT ▶</button>
          </div>
          <span class="book-page-num" id="page-num" style="font-weight: 800; min-width: 60px; text-align: center;">1 / 4</span>
        </div>

      </div>
    </section>
  </main>

  <script>
    const slides = [
  {
    "isCover": true,
    "category": "CONTENT #12",
    "title": "TAILWIND CSS VS VANILLA CSS 🎨"
  },
  {
    "title": "TAILWIND CSS: UTILITY-FIRST",
    "subtitle": "Mempercepat pembuatan komponen UI langsung di dalam baris tag HTML:",
    "bullets": [
      "Kecepatan Luar Biasa: Tidak perlu bolak-balik menulis nama class CSS baru di file terpisah.",
      "Konsistensi Desain: Menggunakan skala warna, padding, dan font-size bawaan framework.",
      "HTML Terlihat Padat: Kode markup HTML dapat menjadi panjang akibat tumpukan utility class."
    ]
  },
  {
    "title": "VANILLA CSS: KONTROL TOTAL",
    "subtitle": "Menulis kode CSS murni memberikan kebebasan kustomisasi arsitektur visual secara penuh:",
    "bullets": [
      "Bebas & Tanpa Batasan: Mudah menyusun tata letak brutalist atau efek micro-animation khusus.",
      "Mudah Dipelajari: Cukup memahami aturan sintaksis CSS dasar tanpa dependensi external.",
      "Struktur File Rapi: Memisahkan struktur konten (HTML) dan gaya visual secara teratur."
    ]
  },
  {
    "title": "KAPAN HARUS PAKAI YANG MANA? ⚡",
    "subtitle": "Rekomendasi taktis untuk web proyek skripsi atau tugas akhir Anda:",
    "bullets": [
      "Gunakan Tailwind untuk dashboard admin yang membutuhkan banyak komponen UI standar dengan cepat.",
      "Gunakan Vanilla CSS untuk landing page kreatif bertema Brutalist dengan desain artistik unik.",
      "Butuh jasa styling website custom yang keren dan responsive? Chat admin via DM TikTok @weecoo!"
    ]
  }
];

    let currentIdx = 0;

    function renderSlide() {
      const slide = slides[currentIdx];
      const viewport = document.getElementById('slide-viewport');
      const pageNum = document.getElementById('page-num');
      
      pageNum.textContent = (currentIdx + 1) + ' / ' + slides.length;
      
      if (slide.isCover) {
        viewport.innerHTML = `
          <div class="content-header">
            <span class="content-brand">weecoo.</span>
            <span class="content-page-num" id="page-num-inner"></span>
          </div>
          <div class="content-content-area">
            <div class="content-cover-wrapper">
              <div class="content-cover-badge">${slide.category}</div>
              <h2 class="content-cover-title">${slide.title}</h2>
            </div>
          </div>
          <div class="content-footer">
            <span class="content-author">@weecoo</span>
            <span class="content-author">MASTERED BLUEPRINT ⚡</span>
          </div>
        `;
      } else {
        let bulletListHtml = '';
        if (slide.bullets) {
          slide.bullets.forEach(bullet => {
            bulletListHtml += \`<li class="content-bullet-item">\${bullet}</li>\`;
          });
        }
        
        let codeBlockHtml = '';
        if (slide.code) {
          codeBlockHtml += \`<pre class="content-code-block">\${slide.code}</pre>\`;
        }
        
        viewport.innerHTML = `
          <div class="content-header">
            <span class="content-brand">weecoo.</span>
            <span class="content-page-num" id="page-num-inner"></span>
          </div>
          <div class="content-content-area">
            <h2 class="content-slide-title">${slide.title}</h2>
            ${slide.subtitle ? \`<p class="content-slide-subtitle">\${slide.subtitle}</p>\` : ''}
            ${codeBlockHtml}
            ${bulletListHtml ? \`<ul class="content-bullets">\${bulletListHtml}</ul>\` : ''}
          </div>
          <div class="content-footer">
            <span class="content-author">@weecoo</span>
            <span class="content-author">MASTERED BLUEPRINT ⚡</span>
          </div>
        `;
      }
      
      document.getElementById('page-num-inner').textContent = (currentIdx + 1) + '/' + slides.length;
    }

    document.getElementById('prev-btn').addEventListener('click', () => {
      if (currentIdx > 0) {
        currentIdx--;
        renderSlide();
      }
    });

    document.getElementById('next-btn').addEventListener('click', () => {
      if (currentIdx < slides.length - 1) {
        currentIdx++;
        renderSlide();
      }
    });

    renderSlide();
  </script>
</body>
</html>
